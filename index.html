<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1F3864">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LA Canvas">
<title>LA Canvas</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:#1F3864; --navydim:#162a4e; --navylt:#2d4f8a;
  --yellow:#FFC425; --white:#fff; --off:#f4f6fb;
  --text:#1a1a2e; --green:#1a6b3a;
  --dot:rgba(31,56,100,0.14);
}
html,body {
  height:100%; width:100%; overflow:hidden;
  font-family:'Inter',sans-serif; background:var(--navydim);
  touch-action:none; user-select:none; -webkit-user-select:none;
}

/* ═══════════════════════ HOME SCREEN ═══════════════════════ */
#home {
  position:fixed; inset:0; display:flex; flex-direction:column;
  background:var(--navydim);
}
#home-bar {
  height:56px; flex-shrink:0; background:var(--navy);
  display:flex; align-items:center; padding:0 20px; gap:12px;
  box-shadow:0 2px 12px rgba(0,0,0,.4);
}
.h-badge {
  width:32px; height:32px; background:var(--yellow); border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; color:var(--navy); font-size:11px; flex-shrink:0;
}
#home-bar h1 {
  font-size:16px; font-weight:700; color:var(--white); flex:1;
  letter-spacing:-.02em;
}
#home-new-btn {
  height:34px; padding:0 16px; border-radius:8px;
  background:var(--yellow); color:var(--navy);
  border:none; font-size:13px; font-weight:700;
  font-family:'Inter',sans-serif; cursor:pointer;
  display:flex; align-items:center; gap:6px;
  transition:opacity .13s; flex-shrink:0;
}
#home-new-btn:hover { opacity:.88; }

#home-body {
  flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding:20px;
}
#home-empty {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:14px; height:100%;
  color:rgba(255,255,255,.35); text-align:center;
}
#home-empty svg { opacity:.25; }
#home-empty p { font-size:15px; font-weight:500; }
#home-empty span { font-size:13px; opacity:.7; }

#board-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
  gap:14px;
}
.board-card {
  background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.12);
  border-radius:12px; overflow:hidden;
  cursor:pointer; transition:border-color .15s, transform .1s;
  display:flex; flex-direction:column;
  position:relative;
}
.board-card:hover { border-color:var(--yellow); transform:scale(1.02); }
.board-card:active { transform:scale(0.98); }
.bc-thumb {
  width:100%; aspect-ratio:16/10;
  background:#f7f9fd;
  display:block;
}
.bc-info {
  padding:10px 12px 12px;
  flex:1; display:flex; flex-direction:column; gap:3px;
}
.bc-name {
  font-size:13px; font-weight:600; color:var(--white);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.bc-date { font-size:10px; color:rgba(255,255,255,.4); }
.bc-del {
  position:absolute; top:7px; right:7px;
  width:22px; height:22px; border-radius:50%;
  background:rgba(192,57,43,.85); color:white;
  border:none; font-size:14px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; opacity:0; transition:opacity .15s;
  line-height:1;
}
.board-card:hover .bc-del { opacity:1; }

/* ═══════════════════════ CANVAS APP ═══════════════════════ */
#app { position:fixed; inset:0; display:flex; flex-direction:column; display:none; }

#topbar {
  height:44px; flex-shrink:0; background:var(--navy);
  display:flex; align-items:center; padding:0 10px; gap:7px;
  box-shadow:0 2px 12px rgba(0,0,0,.4); z-index:100; position:relative;
}
.badge {
  width:28px; height:28px; background:var(--yellow); border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; color:var(--navy); font-size:10px; flex-shrink:0;
}
#app-title {
  font-size:13px; font-weight:600; color:var(--white); flex:1;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.tbtn {
  height:28px; min-width:28px;
  background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.18);
  border-radius:6px; color:var(--white);
  font-size:10px; font-weight:600; font-family:'Inter',sans-serif;
  cursor:pointer; padding:0 8px;
  display:flex; align-items:center; justify-content:center;
  gap:4px; transition:background .13s; white-space:nowrap; flex-shrink:0;
}
.tbtn:hover { background:rgba(255,255,255,.2); }
.tbtn svg { flex-shrink:0; }
#page-counter {
  font-size:10px; font-weight:600; color:rgba(255,255,255,.5);
  white-space:nowrap; flex-shrink:0;
}
#save-indicator {
  font-size:9px; font-weight:600; color:rgba(255,255,255,.3);
  white-space:nowrap; flex-shrink:0; transition:color .3s;
}
#save-indicator.saving { color:var(--yellow); }
#save-indicator.saved  { color:rgba(255,255,255,.4); }
#prog-wrap { position:absolute; bottom:0; left:0; right:0; height:2px; background:rgba(255,255,255,.1); }
#prog-fill { height:100%; background:var(--yellow); transition:width .25s ease; }

#canvas-wrap { flex:1; position:relative; overflow:hidden; background:#f7f9fd; }
#main-canvas { position:absolute; inset:0; touch-action:none; }

#page-strip {
  height:52px; flex-shrink:0; background:var(--navydim);
  border-top:1px solid rgba(255,255,255,.1);
  display:flex; align-items:center; padding:0 12px; gap:8px;
  overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
#page-strip::-webkit-scrollbar { display:none; }
.page-thumb {
  flex-shrink:0; width:60px; height:36px; border-radius:5px;
  border:2px solid rgba(255,255,255,.2); background:rgba(255,255,255,.06);
  cursor:pointer; position:relative; transition:border-color .15s, transform .1s;
  overflow:hidden;
}
.page-thumb:hover { border-color:rgba(255,255,255,.4); transform:scale(1.05); }
.page-thumb.active { border-color:var(--yellow); }
.page-thumb canvas { width:100%; height:100%; display:block; }
.thumb-del {
  position:absolute; top:2px; right:2px; width:14px; height:14px;
  border-radius:50%; background:rgba(192,57,43,0.85); color:white;
  border:none; font-size:11px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; opacity:0; transition:opacity .15s; line-height:1; padding:0;
}
.page-thumb:hover .thumb-del { opacity:1; }
.page-thumb .pg-num {
  position:absolute; bottom:2px; right:4px;
  font-size:8px; font-weight:700; color:rgba(255,255,255,.6);
}
#add-page-btn {
  flex-shrink:0; width:36px; height:36px; border-radius:5px;
  border:2px dashed rgba(255,255,255,.25); background:transparent;
  color:rgba(255,255,255,.5); cursor:pointer; font-size:20px;
  display:flex; align-items:center; justify-content:center; transition:all .15s;
}
#add-page-btn:hover { border-color:var(--yellow); color:var(--yellow); }

/* ── PEN UI ── */
#pen-ui-wrap {
  position:fixed; left:16px; bottom:68px;
  z-index:90; display:flex; align-items:center; gap:8px; touch-action:none;
}
#pen-pill {
  width:44px; height:44px; border-radius:50%; background:var(--navylt);
  border:1.5px solid rgba(255,255,255,.3);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 3px 10px rgba(0,0,0,.4); flex-shrink:0; position:relative;
  color:white; cursor:pointer; transition:background .15s;
}
#pen-pill:hover { background:var(--navy); }
#pen-pill::after {
  content:''; position:absolute; width:8px; height:8px; border-radius:50%;
  border:1.5px solid white; bottom:2px; right:2px;
  background:var(--cur-col,#1a1a2e); transition:background .14s;
}
#pen-bar {
  display:flex; align-items:center; gap:6px;
  background:rgba(31,56,100,0.95); border:1px solid rgba(255,255,255,.15);
  border-radius:16px; padding:0 10px; height:34px;
  transition:max-width .3s cubic-bezier(0.4,0,0.2,1), opacity .2s ease, margin-left .3s ease;
  max-width:400px; overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,.3); backdrop-filter:blur(4px);
}
#pen-bar.hidden { max-width:0; opacity:0; padding:0; border-width:0; margin-left:-8px; }
.pb-sep { width:1px; height:18px; background:rgba(255,255,255,.15); margin:0 2px; }
.csw {
  width:18px; height:18px; border-radius:50%;
  border:2px solid transparent; cursor:pointer; transition:transform .12s; flex-shrink:0;
}
.csw:hover { transform:scale(1.2); }
.csw.active { border-color:white; box-shadow:0 0 0 1px rgba(255,255,255,.4); }
.psz {
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.15);
  color:white; border-radius:4px; width:22px; height:22px;
  display:flex; align-items:center; justify-content:center;
  transition:all .12s; cursor:pointer; padding:0;
}
.psz:hover,.psz.active { background:var(--yellow); color:var(--navy); border-color:var(--yellow); }
.pact {
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.85); border-radius:4px;
  width:24px; height:24px; font-size:12px; font-weight:600;
  display:flex; align-items:center; justify-content:center;
  transition:all .13s; cursor:pointer;
}
.pact:hover { background:rgba(255,255,255,.2); color:white; }
.pact.danger:hover,.pact.erase-on { background:#c0392b; color:white; border-color:#c0392b; }

/* ── UNDO/REDO/SNAP FABs ── */
#ur-wrap {
  position:fixed; right:16px; bottom:68px;
  z-index:90; display:flex; flex-direction:column; gap:8px;
}
#snap-fab,#undo-fab,#redo-fab {
  width:40px; height:40px; border-radius:50%; background:var(--navylt);
  border:1.5px solid rgba(255,255,255,.25); color:white;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-shadow:0 3px 10px rgba(0,0,0,.35); transition:background .13s;
}
#snap-fab:hover,#undo-fab:hover,#redo-fab:hover { background:var(--navy); }
#undo-fab:disabled,#redo-fab:disabled { opacity:.3; cursor:default; }
#snap-fab.active { background:var(--yellow); color:var(--navy); border-color:var(--yellow); }

/* ── ZOOM PILL ── */
#zoom-pill {
  position:absolute; bottom:16px; right:16px;
  background:rgba(31,56,100,.8); border:1px solid rgba(255,255,255,.15);
  border-radius:20px; padding:4px 10px;
  font-size:10px; font-weight:600; color:rgba(255,255,255,.7);
  backdrop-filter:blur(4px); pointer-events:none;
  opacity:0; transition:opacity .3s;
}
#zoom-pill.visible { opacity:1; }

/* ── OVERLAYS ── */
#pdf-overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(22,42,78,.88);
  align-items:center; justify-content:center;
  flex-direction:column; gap:14px;
  color:white; font-size:14px; font-weight:600;
}
#pdf-overlay.active { display:flex; }
#pdf-spinner {
  width:38px; height:38px; border:3px solid rgba(255,255,255,.2);
  border-top-color:var(--yellow); border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

#del-confirm {
  display:none; position:fixed; inset:0; z-index:190;
  background:rgba(22,42,78,.7); align-items:center; justify-content:center;
}
#del-confirm.active { display:flex; }
#del-box {
  background:var(--navydim); border:1.5px solid rgba(255,255,255,.2);
  border-radius:12px; padding:24px 28px;
  display:flex; flex-direction:column; gap:16px;
  color:white; max-width:280px; text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
#del-box h3 { font-size:15px; font-weight:700; }
#del-box p  { font-size:12px; color:rgba(255,255,255,.6); }
.del-btns { display:flex; gap:8px; }
.del-btns button {
  flex:1; height:34px; border-radius:6px; border:none;
  font-family:'Inter',sans-serif; font-size:12px; font-weight:600; cursor:pointer;
}
#del-cancel { background:rgba(255,255,255,.1); color:white; }
#del-cancel:hover { background:rgba(255,255,255,.2); }
#del-ok { background:#c0392b; color:white; }
#del-ok:hover { background:#a93226; }

#toast {
  position:fixed; bottom:80px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--navy); color:white;
  font-size:12px; font-weight:600;
  padding:8px 16px; border-radius:20px;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
  opacity:0; transition:all .25s;
  pointer-events:none; z-index:300; white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ═══════════════════ HOME SCREEN ═══════════════════ -->
<div id="home">
  <div id="home-bar">
    <div class="h-badge">LA</div>
    <h1>LA Canvas</h1>
    <button id="home-new-btn" onclick="newBoard()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Board

    <div id="home-empty" style="display:none">

<div id="app">
  <div id="topbar">

    <button class="psz" data-s="12"><svg width="13" height="13"><circle cx="6.5" cy="6.5" r="5.5" fill="currentColor"/></svg></button>

  </button>

<div id="pdf-overlay"><div id="pdf-spinner"></div><span id="pdf-status">Preparing…</span></div>

  <div id="del-box">
    <h3 id="del-title">Delete this page?</h3>
    <p id="del-msg">All annotations on this page will be lost.</p>

<script>
/* ═══════════════════════════════════════════════════════
   LA CANVAS — with IndexedDB persistence + home screen
═══════════════════════════════════════════════════════ */

/* ── INDEXEDDB ── */
const DB_NAME    = 'la-canvas-db';
const DB_VERSION = 1;
const STORE      = 'boards';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        const store = d.createObjectStore(STORE, { keyPath:'id' });
        store.createIndex('updated', 'updated', { unique:false });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror   = () => reject(req.error);
  });
}

function dbGet(id) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

function dbPut(record) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).put(record);
    req.onsuccess = () => resolve();
    req.onerror   = () => reject(req.error);
  });
}

function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).delete(id);
    req.onsuccess = () => resolve();
    req.onerror   = () => reject(req.error);
  });
}

function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx    = db.transaction(STORE, 'readonly');
    const index = tx.objectStore(STORE).index('updated');
    const req   = index.getAll();
    req.onsuccess = () => resolve(req.result.reverse()); // newest first
    req.onerror   = () => reject(req.error);
  });
}

    })))
  });

let boardCreated = Date.now();

function generateBoardThumb() {
  // Render all pages' strokes to a small canvas and return dataURL
  const W = 320, H = 200;
  const tc    = document.createElement('canvas');
  tc.width    = W; tc.height = H;
  const tctx  = tc.getContext('2d');
  tctx.fillStyle = '#f7f9fd';
  tctx.fillRect(0, 0, W, H);

  // Collect all strokes across all pages
  const allStrokes = pages.flat();
  if (allStrokes.length === 0) return tc.toDataURL();

  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for (const s of allStrokes) {
    for (const p of s.pts) {
      if(p.x<minX)minX=p.x; if(p.y<minY)minY=p.y;
      if(p.x>maxX)maxX=p.x; if(p.y>maxY)maxY=p.y;
    }
  }
  if (minX===Infinity) return tc.toDataURL();

  const pad=12, bW=maxX-minX||1, bH=maxY-minY||1;
  const sc = Math.min((W-pad*2)/bW,(H-pad*2)/bH)*0.9;
  const ox = pad+(W-pad*2-bW*sc)/2-minX*sc;
  const oy = pad+(H-pad*2-bH*sc)/2-minY*sc;

  // Dot paper
  tctx.fillStyle='rgba(31,56,100,0.1)';
  for(let x=0;x<W;x+=10)for(let y=0;y<H;y+=10){tctx.beginPath();tctx.arc(x,y,.6,0,Math.PI*2);tctx.fill();}

  for (const s of allStrokes) {
    if (s.erase||s.pts.length<2) continue;
    tctx.save();
    tctx.lineCap='round';tctx.lineJoin='round';
    tctx.strokeStyle=s.col;
    tctx.lineWidth=Math.max(1,s.size*sc);
    tctx.beginPath();
    tctx.moveTo(s.pts[0].x*sc+ox,s.pts[0].y*sc+oy);
    for(let i=1;i<s.pts.length;i++)tctx.lineTo(s.pts[i].x*sc+ox,s.pts[i].y*sc+oy);
    tctx.stroke();tctx.restore();
  }
  return tc.toDataURL();
}

async function renderHomeGrid() {
  const boards = await dbGetAll();
  const grid   = document.getElementById('board-grid');
  const empty  = document.getElementById('home-empty');
  grid.innerHTML = '';

  if (boards.length === 0) {

    if (board.thumb) {

      image.src = board.thumb;
    }

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diffMs = now - d;
  const diffMins = Math.floor(diffMs / 60000);
  const diffHrs  = Math.floor(diffMs / 3600000);
  const diffDays = Math.floor(diffMs / 86400000);
  if (diffMins < 1)   return 'Just now';
  if (diffMins < 60)  return `${diffMins}m ago`;
  if (diffHrs  < 24)  return `${diffHrs}h ago`;
  if (diffDays < 7)   return `${diffDays}d ago`;
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}

/* ── CANVAS ENGINE ── */
const canvas = document.getElementById('main-canvas');
const ctx    = canvas ? canvas.getContext('2d') : null;
let drawing  = false, lx = 0, ly = 0;
let eraseOn  = false, penCol = '#1a1a2e', penSz = 3;

let pages      = [[]];
let curPage    = 0;
let curStroke  = null;
let undoStacks = [[]];
let redoStacks = [[]];

let scale   = 1, offsetX = 0, offsetY = 0;
let lastTouchDist = null, lastTouchMid = null;
let panning = false, panStart = null, panOffStart = null;
let activePointers = {};
let zoomTimer = null;
let snapOn    = false;
let paletteOn = false;

const DOT_SPACING = 22;
const DOT_RADIUS  = 1.2;

function toVirt(sx,sy){ return {x:(sx-offsetX)/scale, y:(sy-offsetY)/scale}; }
function toScreen(vx,vy){ return {x:vx*scale+offsetX, y:vy*scale+offsetY}; }

function resizeCanvas(){
  if(!canvas||!ctx) return;
  const dpr=window.devicePixelRatio||1;
  const w=canvas.parentElement.offsetWidth, h=canvas.parentElement.offsetHeight;
  canvas.width=Math.round(w*dpr); canvas.height=Math.round(h*dpr);
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  render();
}
window.addEventListener('resize', resizeCanvas);

function render(){
  if(!ctx) return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.offsetWidth, H=canvas.parentElement.offsetHeight;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  drawDots(W,H);
  for(const s of pages[curPage]) drawStroke(s);
  if(curStroke&&curStroke.pts.length>1) drawStroke(curStroke);
}

function drawDots(W,H){
  const sv=toVirt(0,0), ev=toVirt(W,H);
  const gx0=Math.floor(sv.x/DOT_SPACING)*DOT_SPACING;
  const gy0=Math.floor(sv.y/DOT_SPACING)*DOT_SPACING;
  ctx.fillStyle=`rgba(31,56,100,0.14)`;
  for(let vx=gx0;vx<ev.x+DOT_SPACING;vx+=DOT_SPACING){
    for(let vy=gy0;vy<ev.y+DOT_SPACING;vy+=DOT_SPACING){
      const s=toScreen(vx,vy);
      ctx.beginPath();ctx.arc(s.x,s.y,DOT_RADIUS*scale,0,Math.PI*2);ctx.fill();
    }
  }
}

function drawStroke(s){
  if(s.pts.length<2)return;
  ctx.save();ctx.lineCap='round';ctx.lineJoin='round';
  if(s.erase){ctx.globalCompositeOperation='destination-out';ctx.strokeStyle='rgba(0,0,0,1)';ctx.lineWidth=s.size*scale*6;}
  else{ctx.globalCompositeOperation='source-over';ctx.strokeStyle=s.col;ctx.lineWidth=s.size*scale;}
  ctx.beginPath();
  const p0=toScreen(s.pts[0].x,s.pts[0].y); ctx.moveTo(p0.x,p0.y);
  for(let i=1;i<s.pts.length;i++){const p=toScreen(s.pts[i].x,s.pts[i].y);ctx.lineTo(p.x,p.y);}
  ctx.stroke();ctx.restore();
}

function applyZoom(ns,px,py){
  ns=Math.min(8,Math.max(.1,ns));
  offsetX=px-(px-offsetX)*(ns/scale);
  offsetY=py-(py-offsetY)*(ns/scale);
  scale=ns; showZoomPill(); render();
}
function resetView(){scale=1;offsetX=0;offsetY=0;showZoomPill();render();}
function showZoomPill(){
  const p=document.getElementById('zoom-pill');
  p.textContent=Math.round(scale*100)+'%';
  p.classList.add('visible');
  clearTimeout(zoomTimer);
  zoomTimer=setTimeout(()=>p.classList.remove('visible'),1500);
}

/* ── POINTER EVENTS ── */
function isPenOrMouse(e){return e.pointerType==='pen'||e.pointerType==='mouse';}

canvas.addEventListener('pointerdown',onPointerDown,{passive:false});
canvas.addEventListener('pointermove',onPointerMove,{passive:false});
canvas.addEventListener('pointerup',onPointerUp);
canvas.addEventListener('pointercancel',onPointerUp);

function onPointerDown(e){
  e.preventDefault();
  activePointers[e.pointerId]={x:e.clientX,y:e.clientY,type:e.pointerType};
  canvas.setPointerCapture(e.pointerId);
  const n=Object.keys(activePointers).length;
  const rect=canvas.parentElement.getBoundingClientRect();
  if(isPenOrMouse(e)&&n===1){
    drawing=true;
    const v=toVirt(e.clientX-rect.left,e.clientY-rect.top);
    curStroke={col:penCol,size:penSz,erase:eraseOn,pts:[v]};
  } else if(!isPenOrMouse(e)){
    if(n===1){panning=true;panStart={x:e.clientX,y:e.clientY};panOffStart={x:offsetX,y:offsetY};}
    else if(n===2){
      drawing=false;panning=false;curStroke=null;
      const pts=Object.values(activePointers);
      lastTouchDist=Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y);
      lastTouchMid={x:(pts[0].x+pts[1].x)/2-rect.left,y:(pts[0].y+pts[1].y)/2-rect.top};
      render();
    }
  }
}

function onPointerMove(e){
  e.preventDefault();
  if(!activePointers[e.pointerId])return;
  activePointers[e.pointerId]={x:e.clientX,y:e.clientY};
  const n=Object.keys(activePointers).length;
  const rect=canvas.parentElement.getBoundingClientRect();
  if(n===2){
    const pts=Object.values(activePointers);
    const dist=Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y);
    const mid={x:(pts[0].x+pts[1].x)/2-rect.left,y:(pts[0].y+pts[1].y)/2-rect.top};
    if(lastTouchDist!==null){
      applyZoom(scale*(dist/lastTouchDist),mid.x,mid.y);
      offsetX+=mid.x-lastTouchMid.x;offsetY+=mid.y-lastTouchMid.y;render();
    }
    lastTouchDist=dist;lastTouchMid=mid;
  } else if(n===1){
    if(drawing&&curStroke){
      const v=toVirt(e.clientX-rect.left,e.clientY-rect.top);
      curStroke.pts.push(v);render();
    } else if(panning&&panStart){
      offsetX=panOffStart.x+(e.clientX-panStart.x);
      offsetY=panOffStart.y+(e.clientY-panStart.y);render();
    }
  }
}

function onPointerUp(e){
  delete activePointers[e.pointerId];
  const n=Object.keys(activePointers).length;
  if(n<2){lastTouchDist=null;lastTouchMid=null;}
  if(drawing&&curStroke){
    const stroke=curStroke;curStroke=null;drawing=false;
    if(stroke.pts.length>0){
      if(snapOn){
        const snap=trySnapShape(stroke);
        commitStroke(snap?makeShapeStroke(snap,stroke):stroke);
      } else {
        commitStroke(stroke);
      }
    } else render();
  }
  if(n===0){panning=false;panStart=null;}
}

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=canvas.parentElement.getBoundingClientRect();
  applyZoom(scale*(e.deltaY<0?1.1:.9),e.clientX-rect.left,e.clientY-rect.top);
},{passive:false});

/* ── UNDO/REDO ── */
function syncUndoRedo(){
  const u=document.getElementById('undo-fab');
  const r=document.getElementById('redo-fab');
  if(u)u.disabled=!undoStacks[curPage]||undoStacks[curPage].length===0;
  if(r)r.disabled=!redoStacks[curPage]||redoStacks[curPage].length===0;
}
function commitStroke(stroke){
  undoStacks[curPage].push(JSON.parse(JSON.stringify(pages[curPage])));
  if(undoStacks[curPage].length>60)undoStacks[curPage].shift();
  redoStacks[curPage]=[];
  pages[curPage].push(stroke);
  updateThumb(curPage);syncUndoRedo();render();
  scheduleAutoSave();
}
function undo(){
  if(!undoStacks[curPage]||undoStacks[curPage].length===0){showToast('Nothing to undo');return;}
  redoStacks[curPage].push(JSON.parse(JSON.stringify(pages[curPage])));
  pages[curPage]=undoStacks[curPage].pop();
  render();updateThumb(curPage);syncUndoRedo();scheduleAutoSave();
}
function redo(){
  if(!redoStacks[curPage]||redoStacks[curPage].length===0){showToast('Nothing to redo');return;}
  undoStacks[curPage].push(JSON.parse(JSON.stringify(pages[curPage])));
  pages[curPage]=redoStacks[curPage].pop();
  render();updateThumb(curPage);syncUndoRedo();scheduleAutoSave();
}

/* ── SHAPE SNAP ── */
function toggleSnap(){
  snapOn=!snapOn;
  document.getElementById('snap-fab').classList.toggle('active',snapOn);
  showToast(snapOn?'Shape recognition on':'Shape recognition off');
}

function trySnapShape(stroke){
  const pts=stroke.pts;
  if(pts.length<6||stroke.erase)return null;
  let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
  for(const p of pts){if(p.x<mnX)mnX=p.x;if(p.y<mnY)mnY=p.y;if(p.x>mxX)mxX=p.x;if(p.y>mxY)mxY=p.y;}
  const bW=mxX-mnX,bH=mxY-mnY;
  if(bW<12&&bH<12)return null;
  const sL=pathLength(pts);
  const endDist=Math.hypot(pts[pts.length-1].x-pts[0].x,pts[pts.length-1].y-pts[0].y);
  if(endDist/sL>0.85)return{type:'line',x1:pts[0].x,y1:pts[0].y,x2:pts[pts.length-1].x,y2:pts[pts.length-1].y};
  if(endDist>sL*0.3)return null;
  const eps=Math.max(bW,bH)*0.06;
  const simple=rdp(pts,eps);
  const eff=(simple.length>1&&Math.hypot(simple[simple.length-1].x-simple[0].x,simple[simple.length-1].y-simple[0].y)<eps*2)?simple.slice(0,-1):simple;
  const n=eff.length;
  if(n===3)return{type:'triangle',pts:eff};
  if(n===4||n===5)return{type:'rect',x:mnX,y:mnY,w:bW,h:bH};
  if(n>=6){
    const ar=bW>0&&bH>0?Math.min(bW,bH)/Math.max(bW,bH):0;
    const a=bW/2,b=bH/2;
    const ep=Math.PI*(3*(a+b)-Math.sqrt((3*a+b)*(a+3*b)));
    if(ar>0.55&&Math.abs(sL-ep)/ep<0.30)return{type:'circle',cx:(mnX+mxX)/2,cy:(mnY+mxY)/2,r:Math.hypot(bW,bH)/2*.88};
  }
  return null;
}
function pathLength(pts){let l=0;for(let i=1;i<pts.length;i++)l+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);return l;}
function rdp(pts,eps){
  if(pts.length<3)return pts.slice();
  const f=pts[0],la=pts[pts.length-1];
  let mx=0,mi=0;
  for(let i=1;i<pts.length-1;i++){const d=p2ld(pts[i],f,la);if(d>mx){mx=d;mi=i;}}
  if(mx>eps){const L=rdp(pts.slice(0,mi+1),eps),R=rdp(pts.slice(mi),eps);return L.slice(0,-1).concat(R);}
  return[f,la];
}
function p2ld(p,a,b){
  const dx=b.x-a.x,dy=b.y-a.y;
  if(dx===0&&dy===0)return Math.hypot(p.x-a.x,p.y-a.y);
  const t=((p.x-a.x)*dx+(p.y-a.y)*dy)/(dx*dx+dy*dy);
  return Math.hypot(p.x-(a.x+t*dx),p.y-(a.y+t*dy));
}
function makeShapeStroke(shape,orig){
  const base={col:orig.col,size:orig.size,erase:false};
  if(shape.type==='line')base.pts=[{x:shape.x1,y:shape.y1},{x:shape.x2,y:shape.y2}];
  else if(shape.type==='rect'){const{x,y,w,h}=shape;base.pts=[{x,y},{x:x+w,y},{x:x+w,y:y+h},{x,y:y+h},{x,y}];}
  else if(shape.type==='circle'){const{cx,cy,r}=shape;const cp=[];for(let a=0;a<=Math.PI*2+.01;a+=Math.PI/36)cp.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r});base.pts=cp;}
  else if(shape.type==='triangle'){const tp=shape.pts;base.pts=[tp[0],tp[1],tp[2],tp[0]];}
  return base;
}

/* ── PAGES ── */
function addPage(){
  pages.push([]);undoStacks.push([]);redoStacks.push([]);
  curPage=pages.length-1;buildPageStrip();resetView();
  showToast('Page '+(curPage+1)+' added');scheduleAutoSave();
}
function switchPage(i){if(i===curPage)return;curPage=i;buildPageStrip();resetView();updatePageCounter();}
function deletePage(i){deleteTarget=i;document.getElementById('del-title').textContent='Delete this page?';document.getElementById('del-msg').textContent='All annotations on this page will be lost.';document.getElementById('del-confirm').classList.add('active');}
let deleteTarget=null;
function cancelDelete(){document.getElementById('del-confirm').classList.remove('active');deleteTarget=null;deleteBoardId=null;deleteBoardName=null;}
function confirmDelete(){
  if(deleteBoardId){
    // Deleting a board from home
    dbDelete(deleteBoardId).then(()=>{renderHomeGrid();showToast('Board deleted');});
    document.getElementById('del-confirm').classList.remove('active');
    deleteBoardId=null;deleteBoardName=null;
  } else if(deleteTarget!==null){
    if(pages.length===1){showToast('Cannot delete the only page');document.getElementById('del-confirm').classList.remove('active');return;}
    pages.splice(deleteTarget,1);undoStacks.splice(deleteTarget,1);redoStacks.splice(deleteTarget,1);
    if(curPage>=pages.length)curPage=pages.length-1;
    document.getElementById('del-confirm').classList.remove('active');deleteTarget=null;
    buildPageStrip();render();showToast('Page deleted');scheduleAutoSave();
  }
}
function buildPageStrip(){
  const strip=document.getElementById('page-strip');
  strip.querySelectorAll('.page-thumb').forEach(el=>el.remove());
  const addBtn=document.getElementById('add-page-btn');
  pages.forEach((_,i)=>{
    const thumb=document.createElement('div');
    thumb.className='page-thumb'+(i===curPage?' active':'');
    const tc=document.createElement('canvas');tc.width=120;tc.height=72;
    thumb.appendChild(tc);
    const num=document.createElement('span');num.className='pg-num';num.textContent=i+1;thumb.appendChild(num);
    if(pages.length>1){const del=document.createElement('button');del.className='thumb-del';del.textContent='×';del.addEventListener('pointerup',e=>{e.stopPropagation();deletePage(i);});thumb.appendChild(del);}
    thumb.addEventListener('click',()=>switchPage(i));
    strip.insertBefore(thumb,addBtn);
    renderThumb(i,tc);
  });
  updatePageCounter();
}
function updateThumb(i){const strip=document.getElementById('page-strip');const thumbs=strip.querySelectorAll('.page-thumb');if(thumbs[i]){const tc=thumbs[i].querySelector('canvas');if(tc)renderThumb(i,tc);}}
function renderThumb(i,tc){
  const tctx=tc.getContext('2d');const W=tc.width,H=tc.height;
  tctx.clearRect(0,0,W,H);tctx.fillStyle='#f7f9fd';tctx.fillRect(0,0,W,H);
  tctx.fillStyle='rgba(31,56,100,0.12)';
  for(let x=0;x<W;x+=8)for(let y=0;y<H;y+=8){tctx.beginPath();tctx.arc(x,y,.7,0,Math.PI*2);tctx.fill();}
  const strokes=pages[i];if(!strokes||strokes.length===0)return;
  let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
  for(const s of strokes)for(const p of s.pts){if(p.x<mnX)mnX=p.x;if(p.y<mnY)mnY=p.y;if(p.x>mxX)mxX=p.x;if(p.y>mxY)mxY=p.y;}
  if(mnX===Infinity)return;
  const pad=10,bW=mxX-mnX||1,bH=mxY-mnY||1;
  const sc=Math.min((W-pad*2)/bW,(H-pad*2)/bH)*.9;
  const ox=pad+((W-pad*2)-bW*sc)/2-mnX*sc,oy=pad+((H-pad*2)-bH*sc)/2-mnY*sc;
  for(const s of strokes){
    if(s.erase||s.pts.length<2)continue;
    tctx.save();tctx.lineCap='round';tctx.lineJoin='round';tctx.strokeStyle=s.col;tctx.lineWidth=Math.max(1,s.size*sc);
    tctx.beginPath();tctx.moveTo(s.pts[0].x*sc+ox,s.pts[0].y*sc+oy);
    for(let j=1;j<s.pts.length;j++)tctx.lineTo(s.pts[j].x*sc+ox,s.pts[j].y*sc+oy);
    tctx.stroke();tctx.restore();
  }
}
function updatePageCounter(){
  document.getElementById('page-counter').textContent=(curPage+1)+' / '+pages.length;
  document.getElementById('prog-fill').style.width=((curPage+1)/pages.length*100)+'%';
}
function clearPage(){
  if(pages[curPage].length===0){showToast('Page already empty');return;}
  undoStacks[curPage].push(JSON.parse(JSON.stringify(pages[curPage])));
  redoStacks[curPage]=[];pages[curPage]=[];render();updateThumb(curPage);syncUndoRedo();scheduleAutoSave();
}

/* ── TITLE EDIT ── */
function editTitle(){
  const cur=document.getElementById('app-title').textContent;
  const name=prompt('Board name:',cur);
  if(name&&name.trim()){

/* ── PDF EXPORT ── */
async function exportPDF(){
  const overlay=document.getElementById('pdf-overlay');
  const statusEl=document.getElementById('pdf-status');
  overlay.classList.add('active');statusEl.textContent='Loading libraries…';
  if(!window.jspdf)await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  const{jsPDF}=window.jspdf;
  const pW=297,pH=210;
  const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const PDF_W_PX=3508,PDF_H_PX=2480,pad=60;
  for(let pi=0;pi<pages.length;pi++){
    statusEl.textContent=`Exporting page ${pi+1} of ${pages.length}…`;
    const strokes=pages[pi];
    let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
    for(const s of strokes)for(const p of s.pts){if(p.x<mnX)mnX=p.x;if(p.y<mnY)mnY=p.y;if(p.x>mxX)mxX=p.x;if(p.y>mxY)mxY=p.y;}
    const oc=document.createElement('canvas');oc.width=PDF_W_PX;oc.height=PDF_H_PX;
    let rs,rox,roy;
    if(mnX===Infinity){rs=4;rox=PDF_W_PX/2;roy=PDF_H_PX/2;}
    else{const bW=(mxX-mnX)+pad*2,bH=(mxY-mnY)+pad*2;rs=Math.min(PDF_W_PX/bW,PDF_H_PX/bH);rox=(PDF_W_PX-bW*rs)/2+(-mnX+pad)*rs;roy=(PDF_H_PX-bH*rs)/2+(-mnY+pad)*rs;}
    const oc_ctx=oc.getContext('2d');
    oc_ctx.fillStyle='#f7f9fd';oc_ctx.fillRect(0,0,PDF_W_PX,PDF_H_PX);
    oc_ctx.fillStyle='rgba(31,56,100,0.14)';
    const ds=DOT_SPACING*rs,ox_=rox%ds,oy_=roy%ds;
    for(let x=ox_;x<PDF_W_PX+ds;x+=ds)for(let y=oy_;y<PDF_H_PX+ds;y+=ds){oc_ctx.beginPath();oc_ctx.arc(x,y,DOT_RADIUS*rs,0,Math.PI*2);oc_ctx.fill();}
    for(const s of strokes){
      if(s.pts.length<2)continue;
      oc_ctx.save();oc_ctx.lineCap='round';oc_ctx.lineJoin='round';
      if(s.erase){oc_ctx.globalCompositeOperation='destination-out';oc_ctx.strokeStyle='rgba(0,0,0,1)';oc_ctx.lineWidth=s.size*rs*6;}
      else{oc_ctx.globalCompositeOperation='source-over';oc_ctx.strokeStyle=s.col;oc_ctx.lineWidth=s.size*rs;}
      oc_ctx.beginPath();oc_ctx.moveTo(s.pts[0].x*rs+rox,s.pts[0].y*rs+roy);
      for(let i=1;i<s.pts.length;i++)oc_ctx.lineTo(s.pts[i].x*rs+rox,s.pts[i].y*rs+roy);
      oc_ctx.stroke();oc_ctx.restore();
    }
    if(pi>0)pdf.addPage('a4','landscape');
    pdf.addImage(oc.toDataURL('image/png'),'PNG',0,0,pW,pH,undefined,'FAST');
  }
  const title=document.getElementById('app-title').textContent.replace(/\s+/g,'_')||'canvas';
  pdf.save(title+'_annotated.pdf');
  overlay.classList.remove('active');showToast('PDF exported');
}

function loadScript(src){
  return new Promise((resolve,reject)=>{
    if(document.querySelector(`script[src="${src}"]`)){resolve();return;}
    const s=document.createElement('script');s.src=src;s.onload=resolve;s.onerror=reject;document.head.appendChild(s);
  });
}

/* ── TOOL CONTROLS ── */
let _paletteOn=false;
function togglePalette(){_paletteOn=!_paletteOn;document.getElementById('pen-bar').classList.toggle('hidden',!_paletteOn);}
function toggleErase(){eraseOn=!eraseOn;document.getElementById('erase-btn').classList.toggle('erase-on',eraseOn);}
function setCol(el){document.querySelectorAll('.csw').forEach(s=>s.classList.remove('active'));el.classList.add('active');penCol=el.dataset.c;eraseOn=false;document.getElementById('erase-btn').classList.remove('erase-on');document.getElementById('pen-pill').style.setProperty('--cur-col',penCol);}
function setSz(el){document.querySelectorAll('.psz').forEach(s=>s.classList.remove('active'));el.classList.add('active');penSz=parseInt(el.dataset.s);}

document.getElementById('pen-bar').addEventListener('pointerup',e=>{
  if(e.target.closest('.csw'))setCol(e.target.closest('.csw'));
  else if(e.target.closest('.psz'))setSz(e.target.closest('.psz'));
  else if(e.target.closest('#erase-btn'))toggleErase();
  else if(e.target.closest('#clear-btn'))clearPage();
});

const penWrap=document.getElementById('pen-ui-wrap');
let isUIDrag=false,uiDragged=false,uiDragSX,uiDragSY,uiStartL,uiStartT;
penWrap.addEventListener('pointerdown',e=>{
  if(e.target.closest('#pen-bar'))return;
  isUIDrag=true;uiDragged=false;
  uiDragSX=e.clientX;uiDragSY=e.clientY;
  const r=penWrap.getBoundingClientRect();uiStartL=r.left;uiStartT=r.top;
  penWrap.setPointerCapture(e.pointerId);
});
penWrap.addEventListener('pointermove',e=>{
  if(!isUIDrag)return;
  const dx=e.clientX-uiDragSX,dy=e.clientY-uiDragSY;
  if(Math.abs(dx)>5||Math.abs(dy)>5){uiDragged=true;penWrap.style.left=(uiStartL+dx)+'px';penWrap.style.top=(uiStartT+dy)+'px';penWrap.style.bottom='auto';}
});
penWrap.addEventListener('pointerup',e=>{
  if(!isUIDrag)return;isUIDrag=false;penWrap.releasePointerCapture(e.pointerId);
  if(!uiDragged)togglePalette();
});
document.getElementById('pen-pill').style.setProperty('--cur-col',penCol);

/* ── TOAST ── */
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}
