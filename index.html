<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1F3864">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LA Canvas">
<title>LA Canvas</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1F3864;--navydim:#162a4e;--navylt:#2d4f8a;
  --yellow:#FFC425;--white:#fff;--off:#f4f6fb;
  --text:#1a1a2e;--green:#1a6b3a;
  --dot:rgba(31,56,100,0.14);
  --bg-colour:#f7f9fd;
}
html,body{height:100%;width:100%;overflow:hidden;font-family:'Inter',sans-serif;
  background:var(--navydim);touch-action:none;user-select:none;-webkit-user-select:none}

/* HOME */
#home{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--navydim)}
#home-bar{height:56px;flex-shrink:0;background:var(--navy);display:flex;align-items:center;
  padding:0 20px;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.h-badge{width:32px;height:32px;background:var(--yellow);border-radius:7px;display:flex;
  align-items:center;justify-content:center;font-weight:700;color:var(--navy);font-size:11px;flex-shrink:0}
#home-bar h1{font-size:16px;font-weight:700;color:var(--white);flex:1;letter-spacing:-.02em}
#home-new-btn{height:34px;padding:0 16px;border-radius:8px;background:var(--yellow);color:var(--navy);
  border:none;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:opacity .13s;flex-shrink:0}
#home-new-btn:hover{opacity:.88}
#home-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px}
#home-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;height:100%;color:rgba(255,255,255,.35);text-align:center}
#home-empty svg{opacity:.25}
#home-empty p{font-size:15px;font-weight:500}
#home-empty span{font-size:13px;opacity:.7}
#board-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.board-card{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);
  border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .1s;
  display:flex;flex-direction:column;position:relative}
.board-card:hover{border-color:var(--yellow);transform:scale(1.02)}
.board-card:active{transform:scale(.98)}
.bc-thumb{width:100%;aspect-ratio:16/10;background:#f7f9fd;display:block}
.bc-info{padding:10px 12px 12px;flex:1;display:flex;flex-direction:column;gap:3px}
.bc-name{font-size:13px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bc-date{font-size:10px;color:rgba(255,255,255,.4)}
.bc-del{position:absolute;top:7px;right:7px;width:22px;height:22px;border-radius:50%;
  background:rgba(192,57,43,.85);color:white;border:none;font-size:14px;font-weight:700;
  display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .15s;line-height:1}
.board-card:hover .bc-del{opacity:1}

/* APP */
#app{position:fixed;inset:0;display:none;flex-direction:column}
#topbar{height:44px;flex-shrink:0;background:var(--navy);display:flex;align-items:center;
  padding:0 10px;gap:7px;box-shadow:0 2px 12px rgba(0,0,0,.4);z-index:100;position:relative}
.badge{width:28px;height:28px;background:var(--yellow);border-radius:6px;display:flex;
  align-items:center;justify-content:center;font-weight:700;color:var(--navy);font-size:10px;flex-shrink:0}
#app-title{font-size:13px;font-weight:600;color:var(--white);flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbtn{height:28px;min-width:28px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);
  border-radius:6px;color:var(--white);font-size:10px;font-weight:600;font-family:'Inter',sans-serif;
  cursor:pointer;padding:0 8px;display:flex;align-items:center;justify-content:center;
  gap:4px;transition:background .13s;white-space:nowrap;flex-shrink:0}
.tbtn:hover{background:rgba(255,255,255,.2)}
.tbtn svg{flex-shrink:0}
#page-counter{font-size:10px;font-weight:600;color:rgba(255,255,255,.5);white-space:nowrap;flex-shrink:0}
#save-indicator{font-size:9px;font-weight:600;color:rgba(255,255,255,.3);white-space:nowrap;flex-shrink:0;transition:color .3s}
#save-indicator.saving{color:var(--yellow)}
#save-indicator.saved{color:rgba(255,255,255,.4)}
#prog-wrap{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.1)}
#prog-fill{height:100%;background:var(--yellow);transition:width .25s ease}

#canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg-colour);transition:background .3s}
#main-canvas{position:absolute;inset:0;touch-action:none}

/* PAGE STRIP */
#page-strip{height:52px;flex-shrink:0;background:var(--navydim);border-top:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;padding:0 12px;gap:8px;overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
#page-strip::-webkit-scrollbar{display:none}
.page-thumb{flex-shrink:0;width:60px;height:36px;border-radius:5px;border:2px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.06);cursor:pointer;position:relative;transition:border-color .15s,transform .1s;overflow:hidden}
.page-thumb:hover{border-color:rgba(255,255,255,.4);transform:scale(1.05)}
.page-thumb.active{border-color:var(--yellow)}
.page-thumb canvas{width:100%;height:100%;display:block}
.thumb-del{position:absolute;top:2px;right:2px;width:14px;height:14px;border-radius:50%;
  background:rgba(192,57,43,.85);color:white;border:none;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .15s;line-height:1;padding:0}
.page-thumb:hover .thumb-del{opacity:1}
.page-thumb .pg-num{position:absolute;bottom:2px;right:4px;font-size:8px;font-weight:700;color:rgba(255,255,255,.6)}
#add-page-btn{flex-shrink:0;width:36px;height:36px;border-radius:5px;border:2px dashed rgba(255,255,255,.25);
  background:transparent;color:rgba(255,255,255,.5);cursor:pointer;font-size:20px;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
#add-page-btn:hover{border-color:var(--yellow);color:var(--yellow)}

/* PEN UI */
#pen-ui-wrap{position:fixed;left:16px;bottom:68px;z-index:90;display:flex;align-items:center;gap:8px;touch-action:none}
#pen-pill{width:44px;height:44px;border-radius:50%;background:var(--navylt);border:1.5px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.4);
  flex-shrink:0;position:relative;color:white;cursor:pointer;transition:background .15s}
#pen-pill:hover{background:var(--navy)}
#pen-pill::after{content:'';position:absolute;width:8px;height:8px;border-radius:50%;
  border:1.5px solid white;bottom:2px;right:2px;background:var(--cur-col,#1a1a2e);transition:background .14s}
#pen-bar{display:flex;align-items:center;gap:6px;background:rgba(31,56,100,0.95);
  border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:0 10px;height:34px;
  transition:max-width .3s cubic-bezier(0.4,0,0.2,1),opacity .2s ease,margin-left .3s ease;
  max-width:600px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,.3);backdrop-filter:blur(4px)}
#pen-bar.hidden{max-width:0;opacity:0;padding:0;border-width:0;margin-left:-8px}
.pb-sep{width:1px;height:18px;background:rgba(255,255,255,.15);margin:0 2px}
.csw{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .12s;flex-shrink:0}
.csw:hover{transform:scale(1.2)}
.csw.active{border-color:white;box-shadow:0 0 0 1px rgba(255,255,255,.4)}
.psz{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:white;
  border-radius:4px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  transition:all .12s;cursor:pointer;padding:0}
.psz:hover,.psz.active{background:var(--yellow);color:var(--navy);border-color:var(--yellow)}
.pact{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.85);
  border-radius:4px;width:24px;height:24px;font-size:12px;font-weight:600;
  display:flex;align-items:center;justify-content:center;transition:all .13s;cursor:pointer}
.pact:hover{background:rgba(255,255,255,.2);color:white}
.pact.danger:hover,.pact.erase-on{background:#c0392b;color:white;border-color:#c0392b}
/* Background colour swatches */
.bgsw{width:18px;height:18px;border-radius:4px;border:2px solid transparent;cursor:pointer;transition:transform .12s;flex-shrink:0}
.bgsw:hover{transform:scale(1.2)}
.bgsw.active{border-color:white;box-shadow:0 0 0 1px rgba(255,255,255,.4)}

/* FABs */
#ur-wrap{position:fixed;right:16px;bottom:68px;z-index:90;display:flex;flex-direction:column;gap:8px}
#snap-fab,#undo-fab,#redo-fab{width:40px;height:40px;border-radius:50%;background:var(--navylt);
  border:1.5px solid rgba(255,255,255,.25);color:white;display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.35);transition:background .13s}
#snap-fab:hover,#undo-fab:hover,#redo-fab:hover{background:var(--navy)}
#undo-fab:disabled,#redo-fab:disabled{opacity:.3;cursor:default}
#snap-fab.active{background:var(--yellow);color:var(--navy);border-color:var(--yellow)}

/* ZOOM */
#zoom-pill{position:absolute;bottom:16px;right:16px;background:rgba(31,56,100,.8);
  border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 10px;
  font-size:10px;font-weight:600;color:rgba(255,255,255,.7);backdrop-filter:blur(4px);
  pointer-events:none;opacity:0;transition:opacity .3s}
#zoom-pill.visible{opacity:1}

/* OVERLAYS */
#pdf-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(22,42,78,.88);
  align-items:center;justify-content:center;flex-direction:column;gap:14px;
  color:white;font-size:14px;font-weight:600}
#pdf-overlay.active{display:flex}
#pdf-spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,.2);
  border-top-color:var(--yellow);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#del-confirm{display:none;position:fixed;inset:0;z-index:190;background:rgba(22,42,78,.7);
  align-items:center;justify-content:center}
#del-confirm.active{display:flex}
#del-box{background:var(--navydim);border:1.5px solid rgba(255,255,255,.2);border-radius:12px;
  padding:24px 28px;display:flex;flex-direction:column;gap:16px;color:white;
  max-width:280px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#del-box h3{font-size:15px;font-weight:700}
#del-box p{font-size:12px;color:rgba(255,255,255,.6)}
.del-btns{display:flex;gap:8px}
.del-btns button{flex:1;height:34px;border-radius:6px;border:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
#del-cancel{background:rgba(255,255,255,.1);color:white}
#del-cancel:hover{background:rgba(255,255,255,.2)}
#del-ok{background:#c0392b;color:white}
#del-ok:hover{background:#a93226}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--navy);color:white;font-size:12px;font-weight:600;
  padding:8px 16px;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,.3);
  opacity:0;transition:all .25s;pointer-events:none;z-index:300;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Hidden file input for image insert */
#img-input{display:none}
</style>
</head>
<body>

<!-- HOME -->
<div id="home">
  <div id="home-bar">
    <div class="h-badge">LA</div>
    <h1>LA Canvas</h1>
    <button id="home-new-btn" onclick="newBoard()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Board
    </button>
  </div>
  <div id="home-body">
    <div id="home-empty" style="display:none">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
      </svg>
      <p>No boards yet</p>
      <span>Tap New Board to get started</span>
    </div>
    <div id="board-grid"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="topbar">
    <button class="tbtn" onclick="goHome()" title="All boards" style="min-width:26px;width:26px;padding:0">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="badge">LA</div>
    <button class="tbtn" id="title-btn" onclick="editTitle()" title="Rename" style="min-width:26px;width:26px;padding:0">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span id="app-title" style="margin-left:2px">Untitled Board</span>
    <div style="flex:1"></div>
    <span id="save-indicator">●</span>
    <span id="page-counter">1 / 1</span>
    <button class="tbtn" onclick="resetView()" title="Reset view">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </button>
    <!-- Image insert button -->
    <button class="tbtn" onclick="document.getElementById('img-input').click()" title="Insert image">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </button>
    <button class="tbtn" onclick="exportPDF()" title="Export PDF">&#8595; PDF</button>
    <div id="prog-wrap"><div id="prog-fill"></div></div>
  </div>

  <div id="canvas-wrap">
    <canvas id="main-canvas"></canvas>
    <div id="zoom-pill">100%</div>
  </div>
  <div id="page-strip">
    <button id="add-page-btn" onclick="addPage()" title="New page">+</button>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="img-input" accept="image/*">

<!-- PEN UI -->
<div id="pen-ui-wrap" style="display:none">
  <div id="pen-pill" title="Pen options">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
      <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z" fill="currentColor"/>
      <path d="M20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="currentColor"/>
    </svg>
  </div>
  <div id="pen-bar" class="hidden">
    <!-- Pen colours -->
    <div class="csw active" style="background:#1a1a2e" data-c="#1a1a2e"></div>
    <div class="csw" style="background:#c0392b" data-c="#c0392b"></div>
    <div class="csw" style="background:#1565c0" data-c="#1565c0"></div>
    <div class="csw" style="background:#2e7d32" data-c="#2e7d32"></div>
    <div class="csw" style="background:#FFC425" data-c="#FFC425"></div>
    <div class="pb-sep"></div>
    <!-- Pen sizes -->
    <button class="psz active" data-s="3"><svg width="8" height="8"><circle cx="4" cy="4" r="2" fill="currentColor"/></svg></button>
    <button class="psz" data-s="6"><svg width="10" height="10"><circle cx="5" cy="5" r="3.5" fill="currentColor"/></svg></button>
    <button class="psz" data-s="12"><svg width="13" height="13"><circle cx="6.5" cy="6.5" r="5.5" fill="currentColor"/></svg></button>
    <div class="pb-sep"></div>
    <!-- Erase / Clear -->
    <button class="pact" id="erase-btn">&#9003;</button>
    <button class="pact danger" id="clear-btn">&#10005;</button>
    <div class="pb-sep"></div>
    <!-- Background colour swatches -->
    <div class="bgsw active" style="background:#f7f9fd" data-bg="#f7f9fd" title="Default"></div>
    <div class="bgsw" style="background:#fffde7" data-bg="#fffde7" title="Pale yellow"></div>
    <div class="bgsw" style="background:#e8f4f8" data-bg="#e8f4f8" title="Pale blue"></div>
    <div class="bgsw" style="background:#e8f5e9" data-bg="#e8f5e9" title="Pale green"></div>
    <div class="bgsw" style="background:#fce4ec" data-bg="#fce4ec" title="Pale pink"></div>
  </div>
</div>

<!-- FABs -->
<div id="ur-wrap" style="display:none">
  <button id="snap-fab" onclick="toggleSnap()" title="Shape recognition">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 20 2 20"/></svg>
  </button>
  <button id="undo-fab" onclick="undo()" title="Undo">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/>
    </svg>
  </button>
  <button id="redo-fab" onclick="redo()" title="Redo">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/>
    </svg>
  </button>
</div>

<!-- OVERLAYS -->
<div id="pdf-overlay"><div id="pdf-spinner"></div><span id="pdf-status">Preparing…</span></div>
<div id="del-confirm">
  <div id="del-box">
    <h3 id="del-title">Delete this page?</h3>
    <p id="del-msg">All annotations on this page will be lost.</p>
    <div class="del-btns">
      <button id="del-cancel" onclick="cancelDelete()">Cancel</button>
      <button id="del-ok" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════
   LA CANVAS — images, background colours, pen pressure
═══════════════════════════════════════════════════════ */

/* ── INDEXEDDB ── */
const DB_NAME='la-canvas-db', DB_VERSION=1, STORE='boards';
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VERSION);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains(STORE)){
        const s=d.createObjectStore(STORE,{keyPath:'id'});
        s.createIndex('updated','updated',{unique:false});
      }
    };
    req.onsuccess=e=>{db=e.target.result;res(db)};
    req.onerror=()=>rej(req.error);
  });
}
const tx=(mode)=>db.transaction(STORE,mode).objectStore(STORE);
function dbGet(id){return new Promise((r,j)=>{const q=tx('readonly').get(id);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);})}
function dbPut(rec){return new Promise((r,j)=>{const q=tx('readwrite').put(rec);q.onsuccess=()=>r();q.onerror=()=>j(q.error);})}
function dbDelete(id){return new Promise((r,j)=>{const q=tx('readwrite').delete(id);q.onsuccess=()=>r();q.onerror=()=>j(q.error);})}
function dbGetAll(){return new Promise((r,j)=>{const q=tx('readonly').index('updated').getAll();q.onsuccess=()=>r(q.result.reverse());q.onerror=()=>j(q.error);})}

/* ── BOARD STATE ── */
let currentBoardId=null, boardCreated=Date.now(), saveTimer=null;
let bgColour='#f7f9fd'; // per-board background colour

function generateId(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function scheduleAutoSave(){clearTimeout(saveTimer);setSaveIndicator('saving');saveTimer=setTimeout(saveCurrentBoard,1500)}
function setSaveIndicator(s){const el=document.getElementById('save-indicator');if(!el)return;el.className=s}

async function saveCurrentBoard(){
  if(!currentBoardId)return;
  const title=document.getElementById('app-title').textContent;
  const thumb=generateBoardThumb();
  await dbPut({
    id:currentBoardId, name:title,
    created:boardCreated, updated:Date.now(),
    thumb, bgColour,
    // Save pages as array of {strokes, images}
    pages: pageData.map(pg=>({
      strokes: pg.strokes.map(s=>({col:s.col,size:s.size,erase:s.erase,pts:s.pts})),
      images:  pg.images.map(img=>({x:img.x,y:img.y,w:img.w,h:img.h,src:img.src}))
    }))
  });
  setSaveIndicator('saved');
}

function generateBoardThumb(){
  const W=320,H=200;
  const tc=document.createElement('canvas');tc.width=W;tc.height=H;
  const tctx=tc.getContext('2d');
  tctx.fillStyle=bgColour;tctx.fillRect(0,0,W,H);
  const allStrokes=pageData.flatMap(pg=>pg.strokes);
  if(!allStrokes.length)return tc.toDataURL();
  let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
  for(const s of allStrokes)for(const p of s.pts){if(p.x<mnX)mnX=p.x;if(p.y<mnY)mnY=p.y;if(p.x>mxX)mxX=p.x;if(p.y>mxY)mxY=p.y}
  if(mnX===Infinity)return tc.toDataURL();
  const pad=12,bW=mxX-mnX||1,bH=mxY-mnY||1;
  const sc=Math.min((W-pad*2)/bW,(H-pad*2)/bH)*.9;
  const ox=pad+(W-pad*2-bW*sc)/2-mnX*sc, oy=pad+(H-pad*2-bH*sc)/2-mnY*sc;
  tctx.fillStyle='rgba(31,56,100,0.1)';
  for(let x=0;x<W;x+=10)for(let y=0;y<H;y+=10){tctx.beginPath();tctx.arc(x,y,.6,0,Math.PI*2);tctx.fill()}
  for(const s of allStrokes){
    if(s.erase||s.pts.length<2)continue;
    tctx.save();tctx.lineCap='round';tctx.lineJoin='round';tctx.strokeStyle=s.col;tctx.lineWidth=Math.max(1,s.size*sc);
    tctx.beginPath();tctx.moveTo(s.pts[0].x*sc+ox,s.pts[0].y*sc+oy);
    for(let i=1;i<s.pts.length;i++)tctx.lineTo(s.pts[i].x*sc+ox,s.pts[i].y*sc+oy);
    tctx.stroke();tctx.restore();
  }
  return tc.toDataURL();
}

/* ── HOME SCREEN ── */
async function showHome(){
  if(currentBoardId){clearTimeout(saveTimer);await saveCurrentBoard()}
  document.getElementById('app').style.display='none';
  document.getElementById('pen-ui-wrap').style.display='none';
  document.getElementById('ur-wrap').style.display='none';
  document.getElementById('home').style.display='flex';
  currentBoardId=null;
  await renderHomeGrid();
}

async function renderHomeGrid(){
  const boards=await dbGetAll();
  const grid=document.getElementById('board-grid');
  const empty=document.getElementById('home-empty');
  grid.innerHTML='';
  if(!boards.length){empty.style.display='flex';return}
  empty.style.display='none';
  boards.forEach(board=>{
    const card=document.createElement('div');card.className='board-card';
    const img=document.createElement('canvas');img.className='bc-thumb';img.width=320;img.height=200;
    if(board.thumb){const im=new Image();im.onload=()=>img.getContext('2d').drawImage(im,0,0,320,200);im.src=board.thumb}
    const info=document.createElement('div');info.className='bc-info';
    const nm=document.createElement('div');nm.className='bc-name';nm.textContent=board.name||'Untitled Board';
    const dt=document.createElement('div');dt.className='bc-date';dt.textContent=formatDate(board.updated);
    info.appendChild(nm);info.appendChild(dt);
    const del=document.createElement('button');del.className='bc-del';del.textContent='×';
    del.addEventListener('pointerup',e=>{e.stopPropagation();deleteBoard(board.id,board.name||'Untitled Board')});
    card.appendChild(img);card.appendChild(info);card.appendChild(del);
    card.addEventListener('click',()=>openBoard(board.id));
    grid.appendChild(card);
  });
}

function formatDate(ts){
  if(!ts)return'';
  const d=new Date(ts),now=new Date(),dm=now-d;
  const mi=Math.floor(dm/60000),hr=Math.floor(dm/3600000),dy=Math.floor(dm/86400000);
  if(mi<1)return'Just now';if(mi<60)return mi+'m ago';if(hr<24)return hr+'h ago';
  if(dy<7)return dy+'d ago';return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

async function newBoard(){
  const id=generateId();boardCreated=Date.now();
  const rec={id,name:'Untitled Board',created:boardCreated,updated:boardCreated,thumb:null,bgColour:'#f7f9fd',pages:[{strokes:[],images:[]}]};
  await dbPut(rec);loadBoardIntoCanvas(rec);
}

async function openBoard(id){
  const board=await dbGet(id);if(!board)return;loadBoardIntoCanvas(board);
}

function loadBoardIntoCanvas(board){
  currentBoardId=board.id;boardCreated=board.created||Date.now();

  // Restore background colour
  bgColour=board.bgColour||'#f7f9fd';
  applyBgColour(bgColour,false);

  // Restore pages — support old format (array of stroke arrays) and new format ({strokes,images})
  const raw=board.pages||[{strokes:[],images:[]}];
  pageData=raw.map(pg=>{
    if(Array.isArray(pg)){
      // Old format: pg is a stroke array
      return {strokes:pg.map(s=>({...s})), images:[]};
    }
    return {
      strokes:(pg.strokes||[]).map(s=>({...s})),
      images: (pg.images||[]).map(img=>({...img,_el:null}))
    };
  });
  if(!pageData.length)pageData=[{strokes:[],images:[]}];
  // Pre-load image elements
  pageData.forEach(pg=>pg.images.forEach(img=>loadImgEl(img)));

  undoStacks=pageData.map(()=>[]);
  redoStacks=pageData.map(()=>[]);
  curPage=0;

  const title=board.name||'Untitled Board';
  document.getElementById('app-title').textContent=title;
  document.title=title+' — LA Canvas';
  scale=1;offsetX=0;offsetY=0;

  document.getElementById('home').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('pen-ui-wrap').style.display='flex';
  document.getElementById('ur-wrap').style.display='flex';

  resizeCanvas();buildPageStrip();syncUndoRedo();setSaveIndicator('saved');render();
}

function goHome(){showHome()}

/* ── CANVAS ENGINE ── */
const canvas=document.getElementById('main-canvas');
const ctx=canvas?canvas.getContext('2d'):null;
let drawing=false,eraseOn=false,penCol='#1a1a2e',penSz=3;

// pageData: array of {strokes:[], images:[]}
// stroke: {col, size, erase, pts:[{x,y,p}]}  — p = pressure 0-1
// image:  {x, y, w, h, src, _el}             — x,y,w,h in virtual coords
let pageData=[{strokes:[],images:[]}];
let curPage=0,curStroke=null;
let undoStacks=[[]],redoStacks=[[]];
let scale=1,offsetX=0,offsetY=0;
let lastTouchDist=null,lastTouchMid=null;
let panning=false,panStart=null,panOffStart=null;
let activePointers={},zoomTimer=null;
let snapOn=false,_paletteOn=false;

const DOT_SPACING=22,DOT_RADIUS=1.2;

function toVirt(sx,sy){return{x:(sx-offsetX)/scale,y:(sy-offsetY)/scale}}
function toScreen(vx,vy){return{x:vx*scale+offsetX,y:vy*scale+offsetY}}

// Convenience accessors for current page
function strokes(){return pageData[curPage].strokes}
function images(){return pageData[curPage].images}

function resizeCanvas(){
  if(!canvas||!ctx)return;
  const dpr=window.devicePixelRatio||1;
  const w=canvas.parentElement.offsetWidth,h=canvas.parentElement.offsetHeight;
  canvas.width=Math.round(w*dpr);canvas.height=Math.round(h*dpr);
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);render();
}
window.addEventListener('resize',resizeCanvas);

function render(){
  if(!ctx)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.offsetWidth,H=canvas.parentElement.offsetHeight;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  // Background fill (matches canvas-wrap CSS but also fills canvas for PDF consistency)
  ctx.fillStyle=bgColour;ctx.fillRect(0,0,W,H);

  // Dot paper
  drawDots(W,H);

  // Images (below strokes)
  for(const img of images()){
    if(!img._el||!img._el.complete)continue;
    const s=toScreen(img.x,img.y);
    ctx.drawImage(img._el,s.x,s.y,img.w*scale,img.h*scale);
  }

  // Strokes
  for(const s of strokes())drawStroke(s);
  if(curStroke&&curStroke.pts.length>1)drawStroke(curStroke);
}

function drawDots(W,H){
  const sv=toVirt(0,0),ev=toVirt(W,H);
  const gx0=Math.floor(sv.x/DOT_SPACING)*DOT_SPACING;
  const gy0=Math.floor(sv.y/DOT_SPACING)*DOT_SPACING;
  // Dot colour adapts to background
  ctx.fillStyle='rgba(31,56,100,0.13)';
  for(let vx=gx0;vx<ev.x+DOT_SPACING;vx+=DOT_SPACING){
    for(let vy=gy0;vy<ev.y+DOT_SPACING;vy+=DOT_SPACING){
      const s=toScreen(vx,vy);ctx.beginPath();ctx.arc(s.x,s.y,DOT_RADIUS*scale,0,Math.PI*2);ctx.fill();
    }
  }
}

function drawStroke(s){
  if(s.pts.length<2)return;
  ctx.save();ctx.lineCap='round';ctx.lineJoin='round';
  if(s.erase){
    ctx.globalCompositeOperation='destination-out';
    ctx.strokeStyle='rgba(0,0,0,1)';
    // Draw eraser as single path at fixed width
    ctx.lineWidth=s.size*scale*6;
    ctx.beginPath();
    const p0=toScreen(s.pts[0].x,s.pts[0].y);ctx.moveTo(p0.x,p0.y);
    for(let i=1;i<s.pts.length;i++){const p=toScreen(s.pts[i].x,s.pts[i].y);ctx.lineTo(p.x,p.y)}
    ctx.stroke();
  } else {
    ctx.globalCompositeOperation='source-over';
    ctx.strokeStyle=s.col;
    // Pressure-sensitive: draw segment by segment varying lineWidth
    for(let i=1;i<s.pts.length;i++){
      const prev=s.pts[i-1],curr=s.pts[i];
      const pPrev=prev.p!=null?prev.p:0.5;
      const pCurr=curr.p!=null?curr.p:0.5;
      const avgP=(pPrev+pCurr)/2;
      // Width range: 0.4× to 2× base size, smoothed
      const w=s.size*(0.4+avgP*1.6)*scale;
      const a=toScreen(prev.x,prev.y),b=toScreen(curr.x,curr.y);
      ctx.beginPath();ctx.lineWidth=Math.max(0.5,w);ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    }
  }
  ctx.restore();
}

/* ── ZOOM / PAN ── */
function applyZoom(ns,px,py){
  ns=Math.min(8,Math.max(.1,ns));
  offsetX=px-(px-offsetX)*(ns/scale);offsetY=py-(py-offsetY)*(ns/scale);
  scale=ns;showZoomPill();render();
}
function resetView(){scale=1;offsetX=0;offsetY=0;showZoomPill();render()}
function showZoomPill(){
  const p=document.getElementById('zoom-pill');
  p.textContent=Math.round(scale*100)+'%';p.classList.add('visible');
  clearTimeout(zoomTimer);zoomTimer=setTimeout(()=>p.classList.remove('visible'),1500);
}

/* ── POINTER EVENTS ── */
function isPenOrMouse(e){return e.pointerType==='pen'||e.pointerType==='mouse'}
canvas.addEventListener('pointerdown',onPointerDown,{passive:false});
canvas.addEventListener('pointermove',onPointerMove,{passive:false});
canvas.addEventListener('pointerup',onPointerUp);
canvas.addEventListener('pointercancel',onPointerUp);

function onPointerDown(e){
  e.preventDefault();
  activePointers[e.pointerId]={x:e.clientX,y:e.clientY,type:e.pointerType};
  canvas.setPointerCapture(e.pointerId);
  const n=Object.keys(activePointers).length;
  const rect=canvas.parentElement.getBoundingClientRect();
  if(isPenOrMouse(e)&&n===1){
    drawing=true;
    const v=toVirt(e.clientX-rect.left,e.clientY-rect.top);
    const p=e.pressure||0.5;
    curStroke={col:penCol,size:penSz,erase:eraseOn,pts:[{x:v.x,y:v.y,p}]};
  } else if(!isPenOrMouse(e)){
    if(n===1){panning=true;panStart={x:e.clientX,y:e.clientY};panOffStart={x:offsetX,y:offsetY}}
    else if(n===2){
      drawing=false;panning=false;curStroke=null;
      const pts=Object.values(activePointers);
      lastTouchDist=Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y);
      lastTouchMid={x:(pts[0].x+pts[1].x)/2-rect.left,y:(pts[0].y+pts[1].y)/2-rect.top};
      render();
    }
  }
}

function onPointerMove(e){
  e.preventDefault();
  if(!activePointers[e.pointerId])return;
  activePointers[e.pointerId]={x:e.clientX,y:e.clientY};
  const n=Object.keys(activePointers).length;
  const rect=canvas.parentElement.getBoundingClientRect();
  if(n===2){
    const pts=Object.values(activePointers);
    const dist=Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y);
    const mid={x:(pts[0].x+pts[1].x)/2-rect.left,y:(pts[0].y+pts[1].y)/2-rect.top};
    if(lastTouchDist!==null){applyZoom(scale*(dist/lastTouchDist),mid.x,mid.y);offsetX+=mid.x-lastTouchMid.x;offsetY+=mid.y-lastTouchMid.y;render()}
    lastTouchDist=dist;lastTouchMid=mid;
  } else if(n===1){
    if(drawing&&curStroke){
      const v=toVirt(e.clientX-rect.left,e.clientY-rect.top);
      const p=e.pressure||0.5;
      curStroke.pts.push({x:v.x,y:v.y,p});render();
    } else if(panning&&panStart){
      offsetX=panOffStart.x+(e.clientX-panStart.x);offsetY=panOffStart.y+(e.clientY-panStart.y);render();
    }
  }
}

function onPointerUp(e){
  delete activePointers[e.pointerId];
  const n=Object.keys(activePointers).length;
  if(n<2){lastTouchDist=null;lastTouchMid=null}
  if(drawing&&curStroke){
    const stroke=curStroke;curStroke=null;drawing=false;
    if(stroke.pts.length>0){
      if(snapOn){const snap=trySnapShape(stroke);commitStroke(snap?makeShapeStroke(snap,stroke):stroke)}
      else commitStroke(stroke);
    } else render();
  }
  if(n===0){panning=false;panStart=null}
}

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=canvas.parentElement.getBoundingClientRect();
  applyZoom(scale*(e.deltaY<0?1.1:.9),e.clientX-rect.left,e.clientY-rect.top);
},{passive:false});

/* ── UNDO / REDO ── */
function syncUndoRedo(){
  const u=document.getElementById('undo-fab'),r=document.getElementById('redo-fab');
  if(u)u.disabled=!undoStacks[curPage]||!undoStacks[curPage].length;
  if(r)r.disabled=!redoStacks[curPage]||!redoStacks[curPage].length;
}
function snapshotPage(){
  return {
    strokes:JSON.parse(JSON.stringify(strokes())),
    images: images().map(img=>({x:img.x,y:img.y,w:img.w,h:img.h,src:img.src}))
  };
}
function restorePageSnapshot(snap){
  pageData[curPage].strokes=snap.strokes;
  pageData[curPage].images=(snap.images||[]).map(img=>({...img,_el:null}));
  pageData[curPage].images.forEach(img=>loadImgEl(img));
}
function commitStroke(stroke){
  undoStacks[curPage].push(snapshotPage());
  if(undoStacks[curPage].length>60)undoStacks[curPage].shift();
  redoStacks[curPage]=[];
  strokes().push(stroke);
  updateThumb(curPage);syncUndoRedo();render();scheduleAutoSave();
}
function undo(){
  if(!undoStacks[curPage]||!undoStacks[curPage].length){showToast('Nothing to undo');return}
  redoStacks[curPage].push(snapshotPage());
  restorePageSnapshot(undoStacks[curPage].pop());
  render();updateThumb(curPage);syncUndoRedo();scheduleAutoSave();
}
function redo(){
  if(!redoStacks[curPage]||!redoStacks[curPage].length){showToast('Nothing to redo');return}
  undoStacks[curPage].push(snapshotPage());
  restorePageSnapshot(redoStacks[curPage].pop());
  render();updateThumb(curPage);syncUndoRedo();scheduleAutoSave();
}

/* ── IMAGE INSERT ── */
const imgInput=document.getElementById('img-input');
imgInput.addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const src=ev.target.result;
    const tempImg=new Image();
    tempImg.onload=()=>{
      // Resize to max 1920px on longest side
      const MAX=1920;
      let iw=tempImg.naturalWidth,ih=tempImg.naturalHeight;
      if(iw>MAX||ih>MAX){
        const ratio=Math.min(MAX/iw,MAX/ih);iw=Math.round(iw*ratio);ih=Math.round(ih*ratio);
      }
      const oc=document.createElement('canvas');oc.width=iw;oc.height=ih;
      oc.getContext('2d').drawImage(tempImg,0,0,iw,ih);
      const resizedSrc=oc.toDataURL('image/jpeg',0.85);

      // Place at current viewport centre in virtual coords
      const cx=canvas.parentElement.offsetWidth/2;
      const cy=canvas.parentElement.offsetHeight/2;
      const vCentre=toVirt(cx,cy);
      // Display at natural pixel size / scale, capped to 80% of viewport
      const maxVW=(canvas.parentElement.offsetWidth*0.8)/scale;
      const maxVH=(canvas.parentElement.offsetHeight*0.8)/scale;
      let vw=iw/scale,vh=ih/scale;
      if(vw>maxVW||vh>maxVH){const r=Math.min(maxVW/vw,maxVH/vh);vw*=r;vh*=r}

      const imgObj={
        x:vCentre.x-vw/2,y:vCentre.y-vh/2,
        w:vw,h:vh,src:resizedSrc,_el:null
      };
      loadImgEl(imgObj);
      undoStacks[curPage].push(snapshotPage());
      if(undoStacks[curPage].length>60)undoStacks[curPage].shift();
      redoStacks[curPage]=[];
      images().push(imgObj);
      updateThumb(curPage);syncUndoRedo();render();scheduleAutoSave();
      showToast('Image inserted');
    };
    tempImg.src=src;
  };
  reader.readAsDataURL(file);
  imgInput.value=''; // allow re-selecting same file
});

function loadImgEl(imgObj){
  const el=new Image();el.src=imgObj.src;
  el.onload=()=>render();
  imgObj._el=el;
}

/* ── BACKGROUND COLOUR ── */
function applyBgColour(col, save=true){
  bgColour=col;
  document.getElementById('canvas-wrap').style.background=col;
  document.documentElement.style.setProperty('--bg-colour',col);
  // Update swatch active state
  document.querySelectorAll('.bgsw').forEach(el=>{
    el.classList.toggle('active',el.dataset.bg===col);
  });
  render();
  if(save)scheduleAutoSave();
}

/* ── SHAPE RECOGNITION ── */
function toggleSnap(){snapOn=!snapOn;document.getElementById('snap-fab').classList.toggle('active',snapOn);showToast(snapOn?'Shape recognition on':'Shape recognition off')}
function trySnapShape(stroke){
  const pts=stroke.pts;if(pts.length<6||stroke.erase)return null;
  let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
  for(const p of pts){if(p.x<mnX)mnX=p.x;if(p.y<mnY)mnY=p.y;if(p.x>mxX)mxX=p.x;if(p.y>mxY)mxY=p.y}
  const bW=mxX-mnX,bH=mxY-mnY;if(bW<12&&bH<12)return null;
  const sL=pathLength(pts);
  const endDist=Math.hypot(pts[pts.length-1].x-pts[0].x,pts[pts.length-1].y-pts[0].y);
  if(endDist/sL>0.85)return{type:'line',x1:pts[0].x,y1:pts[0].y,x2:pts[pts.length-1].x,y2:pts[pts.length-1].y};
  if(endDist>sL*0.3)return null;
  const eps=Math.max(bW,bH)*0.06;
  const simple=rdp(pts,eps);
  const eff=(simple.length>1&&Math.hypot(simple[simple.length-1].x-simple[0].x,simple[simple.length-1].y-simple[0].y)<eps*2)?simple.slice(0,-1):simple;
  const n=eff.length;
  if(n===3)return{type:'triangle',pts:eff};
  if(n===4||n===5)return{type:'rect',x:mnX,y:mnY,w:bW,h:bH};
  if(n>=6){const ar=bW>0&&bH>0?Math.min(bW,bH)/Math.max(bW,bH):0;const a=bW/2,b=bH/2;const ep=Math.PI*(3*(a+b)-Math.sqrt((3*a+b)*(a+3*b)));if(ar>0.55&&Math.abs(sL-ep)/ep<0.30)return{type:'circle',cx:(mnX+mxX)/2,cy:(mnY+mxY)/2,r:Math.hypot(bW,bH)/2*.88}}
  return null;
}
function pathLength(pts){let l=0;for(let i=1;i<pts.length;i++)l+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);return l}
function rdp(pts,eps){if(pts.length<3)return pts.slice();const f=pts[0],la=pts[pts.length-1];let mx=0,mi=0;for(let i=1;i<pts.length-1;i++){const d=p2ld(pts[i],f,la);if(d>mx){mx=d;mi=i}}if(mx>eps){return rdp(pts.slice(0,mi+1),eps).slice(0,-1).concat(rdp(pts.slice(mi),eps))}return[f,la]}
function p2ld(p,a,b){const dx=b.x-a.x,dy=b.y-a.y;if(!dx&&!dy)return Math.hypot(p.x-a.x,p.y-a.y);const t=((p.x-a.x)*dx+(p.y-a.y)*dy)/(dx*dx+dy*dy);return Math.hypot(p.x-(a.x+t*dx),p.y-(a.y+t*dy))}
function makeShapeStroke(shape,orig){
  const base={col:orig.col,size:orig.size,erase:false};
  if(shape.type==='line')base.pts=[{x:shape.x1,y:shape.y1,p:.5},{x:shape.x2,y:shape.y2,p:.5}];
  else if(shape.type==='rect'){const{x,y,w,h}=shape;base.pts=[{x,y,p:.5},{x:x+w,y,p:.5},{x:x+w,y:y+h,p:.5},{x,y:y+h,p:.5},{x,y,p:.5}]}
  else if(shape.type==='circle'){const{cx,cy,r}=shape;const cp=[];for(let a=0;a<=Math.PI*2+.01;a+=Math.PI/36)cp.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r,p:.5});base.pts=cp}
  else if(shape.type==='triangle'){const tp=shape.pts;base.pts=[{x:tp[0].x,y:tp[0].y,p:.5},{x:tp[1].x,y:tp[1].y,p:.5},{x:tp[2].x,y:tp[2].y,p:.5},{x:tp[0].x,y:tp[0].y,p:.5}]}
  return base;
}

/* ── PAGES ── */
function addPage(){
  pageData.push({strokes:[],images:[]});undoStacks.push([]);redoStacks.push([]);
  curPage=pageData.length-1;buildPageStrip();resetView();
  showToast('Page '+(curPage+1)+' added');scheduleAutoSave();
}
function switchPage(i){if(i===curPage)return;curPage=i;buildPageStrip();resetView();updatePageCounter()}
function deletePage(i){
  document.getElementById('del-title').textContent='Delete this page?';
  document.getElementById('del-msg').textContent='All annotations on this page will be lost.';
  deleteTarget=i;deleteBoardId=null;
  document.getElementById('del-confirm').classList.add('active');
}
let deleteTarget=null;
function cancelDelete(){document.getElementById('del-confirm').classList.remove('active');deleteTarget=null;deleteBoardId=null;deleteBoardName=null}
function confirmDelete(){
  if(deleteBoardId){
    dbDelete(deleteBoardId).then(()=>{renderHomeGrid();showToast('Board deleted')});
    document.getElementById('del-confirm').classList.remove('active');deleteBoardId=null;deleteBoardName=null;
  } else if(deleteTarget!==null){
    if(pageData.length===1){showToast('Cannot delete the only page');document.getElementById('del-confirm').classList.remove('active');return}
    pageData.splice(deleteTarget,1);undoStacks.splice(deleteTarget,1);redoStacks.splice(deleteTarget,1);
    if(curPage>=pageData.length)curPage=pageData.length-1;
    document.getElementById('del-confirm').classList.remove('active');deleteTarget=null;
    buildPageStrip();render();showToast('Page deleted');scheduleAutoSave();
  }
}
function buildPageStrip(){
  const strip=document.getElementById('page-strip');strip.querySelectorAll('.page-thumb').forEach(el=>el.remove());
  const addBtn=document.getElementById('add-page-btn');
  pageData.forEach((_,i)=>{
    const thumb=document.createElement('div');thumb.className='page-thumb'+(i===curPage?' active':'');
    const tc=document.createElement('canvas');tc.width=120;tc.height=72;thumb.appendChild(tc);
    const num=document.createElement('span');num.className='pg-num';num.textContent=i+1;thumb.appendChild(num);
    if(pageData.length>1){const del=document.createElement('button');del.className='thumb-del';del.textContent='×';del.addEventListener('pointerup',e=>{e.stopPropagation();deletePage(i)});thumb.appendChild(del)}
    thumb.addEventListener('click',()=>switchPage(i));
    strip.insertBefore(thumb,addBtn);renderThumb(i,tc);
  });
  updatePageCounter();
}
function updateThumb(i){
  const strip=document.getElementById('page-strip');const thumbs=strip.querySelectorAll('.page-thumb');
  if(thumbs[i]){const tc=thumbs[i].querySelector('canvas');if(tc)renderThumb(i,tc)}
}
function renderThumb(i,tc){
  const tctx=tc.getContext('2d');const W=tc.width,H=tc.height;
  tctx.clearRect(0,0,W,H);tctx.fillStyle=bgColour;tctx.fillRect(0,0,W,H);
  tctx.fillStyle='rgba(31,56,100,0.12)';
  for(let x=0;x<W;x+=8)for(let y=0;y<H;y+=8){tctx.beginPath();tctx.arc(x,y,.7,0,Math.PI*2);tctx.fill()}
  const pg=pageData[i];if(!pg)return;
  // Draw images in thumbnail
  for(const img of pg.images){
    if(!img._el||!img._el.complete)continue;
    // Rough thumb positioning — just draw scaled
    const sc2=0.05;tctx.drawImage(img._el,img.x*sc2+W/4,img.y*sc2+H/4,img.w*sc2,img.h*sc2);
  }
  if(!pg.strokes.length)return;
  let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
  for(const s of pg.strokes)for(const p of s.pts){if(p.x<mnX)mnX=p.x;if(p.y<mnY)mnY=p.y;if(p.x>mxX)mxX=p.x;if(p.y>mxY)mxY=p.y}
  if(mnX===Infinity)return;
  const pad=10,bW=mxX-mnX||1,bH=mxY-mnY||1;
  const sc=Math.min((W-pad*2)/bW,(H-pad*2)/bH)*.9;
  const ox=pad+((W-pad*2)-bW*sc)/2-mnX*sc,oy=pad+((H-pad*2)-bH*sc)/2-mnY*sc;
  for(const s of pg.strokes){
    if(s.erase||s.pts.length<2)continue;
    tctx.save();tctx.lineCap='round';tctx.lineJoin='round';tctx.strokeStyle=s.col;tctx.lineWidth=Math.max(1,s.size*sc);
    tctx.beginPath();tctx.moveTo(s.pts[0].x*sc+ox,s.pts[0].y*sc+oy);
    for(let j=1;j<s.pts.length;j++)tctx.lineTo(s.pts[j].x*sc+ox,s.pts[j].y*sc+oy);
    tctx.stroke();tctx.restore();
  }
}
function updatePageCounter(){
  document.getElementById('page-counter').textContent=(curPage+1)+' / '+pageData.length;
  document.getElementById('prog-fill').style.width=((curPage+1)/pageData.length*100)+'%';
}
function clearPage(){
  if(!strokes().length&&!images().length){showToast('Page already empty');return}
  undoStacks[curPage].push(snapshotPage());redoStacks[curPage]=[];
  pageData[curPage]={strokes:[],images:[]};
  render();updateThumb(curPage);syncUndoRedo();scheduleAutoSave();
}

/* ── TITLE EDIT ── */
function editTitle(){
  const cur=document.getElementById('app-title').textContent;
  const name=prompt('Board name:',cur);
  if(name&&name.trim()){const n=name.trim();document.getElementById('app-title').textContent=n;document.title=n+' — LA Canvas';scheduleAutoSave()}
}

/* ── PDF EXPORT ── */
async function exportPDF(){
  const overlay=document.getElementById('pdf-overlay'),statusEl=document.getElementById('pdf-status');
  overlay.classList.add('active');statusEl.textContent='Loading libraries…';
  if(!window.jspdf)await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  const{jsPDF}=window.jspdf;
  const pW=297,pH=210,PDF_W=3508,PDF_H=2480,pad=60;
  const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  for(let pi=0;pi<pageData.length;pi++){
    statusEl.textContent=`Exporting page ${pi+1} of ${pageData.length}…`;
    const pg=pageData[pi];
    // Compute bounds across strokes AND images
    let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
    for(const s of pg.strokes)for(const p of s.pts){if(p.x<mnX)mnX=p.x;if(p.y<mnY)mnY=p.y;if(p.x>mxX)mxX=p.x;if(p.y>mxY)mxY=p.y}
    for(const img of pg.images){if(img.x<mnX)mnX=img.x;if(img.y<mnY)mnY=img.y;if(img.x+img.w>mxX)mxX=img.x+img.w;if(img.y+img.h>mxY)mxY=img.y+img.h}
    const oc=document.createElement('canvas');oc.width=PDF_W;oc.height=PDF_H;
    let rs,rox,roy;
    if(mnX===Infinity){rs=4;rox=PDF_W/2;roy=PDF_H/2}
    else{const bW=(mxX-mnX)+pad*2,bH=(mxY-mnY)+pad*2;rs=Math.min(PDF_W/bW,PDF_H/bH);rox=(PDF_W-bW*rs)/2+(-mnX+pad)*rs;roy=(PDF_H-bH*rs)/2+(-mnY+pad)*rs}
    const oc_ctx=oc.getContext('2d');
    // Background
    oc_ctx.fillStyle=bgColour;oc_ctx.fillRect(0,0,PDF_W,PDF_H);
    // Dots
    oc_ctx.fillStyle='rgba(31,56,100,0.13)';
    const ds=DOT_SPACING*rs,ox_=rox%ds,oy_=roy%ds;
    for(let x=ox_;x<PDF_W+ds;x+=ds)for(let y=oy_;y<PDF_H+ds;y+=ds){oc_ctx.beginPath();oc_ctx.arc(x,y,DOT_RADIUS*rs,0,Math.PI*2);oc_ctx.fill()}
    // Images
    for(const img of pg.images){
      if(!img._el)continue;
      oc_ctx.drawImage(img._el,img.x*rs+rox,img.y*rs+roy,img.w*rs,img.h*rs);
    }
    // Strokes — pressure sensitive in PDF too
    for(const s of pg.strokes){
      if(s.pts.length<2)continue;
      oc_ctx.save();oc_ctx.lineCap='round';oc_ctx.lineJoin='round';
      if(s.erase){oc_ctx.globalCompositeOperation='destination-out';oc_ctx.strokeStyle='rgba(0,0,0,1)';oc_ctx.lineWidth=s.size*rs*6;oc_ctx.beginPath();oc_ctx.moveTo(s.pts[0].x*rs+rox,s.pts[0].y*rs+roy);for(let i=1;i<s.pts.length;i++)oc_ctx.lineTo(s.pts[i].x*rs+rox,s.pts[i].y*rs+roy);oc_ctx.stroke()}
      else{oc_ctx.globalCompositeOperation='source-over';oc_ctx.strokeStyle=s.col;for(let i=1;i<s.pts.length;i++){const prev=s.pts[i-1],curr=s.pts[i];const avgP=((prev.p||.5)+(curr.p||.5))/2;oc_ctx.lineWidth=Math.max(.5,s.size*(0.4+avgP*1.6)*rs);oc_ctx.beginPath();oc_ctx.moveTo(prev.x*rs+rox,prev.y*rs+roy);oc_ctx.lineTo(curr.x*rs+rox,curr.y*rs+roy);oc_ctx.stroke()}}
      oc_ctx.restore();
    }
    if(pi>0)pdf.addPage('a4','landscape');
    pdf.addImage(oc.toDataURL('image/png'),'PNG',0,0,pW,pH,undefined,'FAST');
  }
  const title=document.getElementById('app-title').textContent.replace(/\s+/g,'_')||'canvas';
  pdf.save(title+'_annotated.pdf');overlay.classList.remove('active');showToast('PDF exported');
}

function loadScript(src){return new Promise((r,j)=>{if(document.querySelector(`script[src="${src}"]`)){r();return}const s=document.createElement('script');s.src=src;s.onload=r;s.onerror=j;document.head.appendChild(s)})}

/* ── TOOL CONTROLS ── */
function togglePalette(){_paletteOn=!_paletteOn;document.getElementById('pen-bar').classList.toggle('hidden',!_paletteOn)}
function toggleErase(){eraseOn=!eraseOn;document.getElementById('erase-btn').classList.toggle('erase-on',eraseOn)}
function setCol(el){document.querySelectorAll('.csw').forEach(s=>s.classList.remove('active'));el.classList.add('active');penCol=el.dataset.c;eraseOn=false;document.getElementById('erase-btn').classList.remove('erase-on');document.getElementById('pen-pill').style.setProperty('--cur-col',penCol)}
function setSz(el){document.querySelectorAll('.psz').forEach(s=>s.classList.remove('active'));el.classList.add('active');penSz=parseInt(el.dataset.s)}
function setBg(el){applyBgColour(el.dataset.bg,true)}

document.getElementById('pen-bar').addEventListener('pointerup',e=>{
  if(e.target.closest('.csw'))setCol(e.target.closest('.csw'));
  else if(e.target.closest('.psz'))setSz(e.target.closest('.psz'));
  else if(e.target.closest('#erase-btn'))toggleErase();
  else if(e.target.closest('#clear-btn'))clearPage();
  else if(e.target.closest('.bgsw'))setBg(e.target.closest('.bgsw'));
});

const penWrap=document.getElementById('pen-ui-wrap');
let isUIDrag=false,uiDragged=false,uiDragSX,uiDragSY,uiStartL,uiStartT;
penWrap.addEventListener('pointerdown',e=>{
  if(e.target.closest('#pen-bar'))return;
  isUIDrag=true;uiDragged=false;uiDragSX=e.clientX;uiDragSY=e.clientY;
  const r=penWrap.getBoundingClientRect();uiStartL=r.left;uiStartT=r.top;penWrap.setPointerCapture(e.pointerId);
});
penWrap.addEventListener('pointermove',e=>{
  if(!isUIDrag)return;const dx=e.clientX-uiDragSX,dy=e.clientY-uiDragSY;
  if(Math.abs(dx)>5||Math.abs(dy)>5){uiDragged=true;penWrap.style.left=(uiStartL+dx)+'px';penWrap.style.top=(uiStartT+dy)+'px';penWrap.style.bottom='auto'}
});
penWrap.addEventListener('pointerup',e=>{
  if(!isUIDrag)return;isUIDrag=false;penWrap.releasePointerCapture(e.pointerId);
  if(!uiDragged)togglePalette();
});
document.getElementById('pen-pill').style.setProperty('--cur-col',penCol);

/* ── TOAST ── */
let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200)}
